<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0b0b12" />
<title>Montage — montage photo premium</title>
<meta name="description" content="Créez un montage photo animé avec transitions élégantes et partagez-le en un geste sur WhatsApp." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="bg-mesh" aria-hidden="true"></div>
<div class="bg-grain" aria-hidden="true"></div>

<header class="topbar">
  <div class="brand">
    <span class="brand-mark">◐</span>
    <span class="brand-name">Montage</span>
  </div>
  <div class="topbar-actions">
    <button id="themeToggle" class="icon-btn" type="button" aria-label="Changer de thème" title="Thème">
      <svg viewBox="0 0 24 24" width="20" height="20"><path d="M12 3a9 9 0 1 0 9 9 7 7 0 0 1-9-9z" fill="currentColor"/></svg>
    </button>
  </div>
</header>

<main class="app">

  <!-- Étape 1 : import -->
  <section id="importZone" class="panel dropzone" aria-label="Import de photos">
    <input id="fileInput" type="file" accept="image/*" multiple hidden />
    <div class="dropzone-inner">
      <div class="dropzone-icon">✦</div>
      <h1>Glissez vos photos ici</h1>
      <p>ou</p>
      <button id="pickFilesBtn" class="btn btn-primary" type="button">Choisir des photos</button>
      <p class="dropzone-hint">JPG, PNG, HEIC — tout reste sur votre appareil</p>
    </div>
  </section>

  <!-- Étape 2 : édition -->
  <section id="editZone" class="edit-zone hidden">

    <div class="edit-grid-col">
      <div class="section-head">
        <h2>Vos photos</h2>
        <span id="photoCount" class="count-pill">0</span>
        <button id="addMoreBtn" class="btn btn-ghost btn-sm" type="button">+ Ajouter</button>
      </div>
      <ul id="photoGrid" class="photo-grid" aria-label="Photos du montage (glisser pour réordonner)"></ul>
    </div>

    <aside class="settings-col">
      <div class="panel settings-panel">
        <h2>Réglages du montage</h2>

        <div class="field">
          <label for="templateSelect">Style</label>
          <select id="templateSelect" class="select">
            <option value="romantique">Romantique</option>
            <option value="voyage" selected>Voyage</option>
            <option value="fete">Fête</option>
            <option value="minimal">Minimaliste</option>
            <option value="custom">Personnalisé</option>
          </select>
        </div>

        <div class="field">
          <label for="transitionSelect">Transition</label>
          <select id="transitionSelect" class="select">
            <option value="crossfade">Fondu croisé</option>
            <option value="fadeBlack">Fondu au noir</option>
            <option value="fadeWhite">Fondu au blanc</option>
            <option value="slide">Glissement</option>
            <option value="kenburns">Zoom Ken Burns</option>
            <option value="dissolve">Dissolve granuleux</option>
            <option value="morph">Morphing doux</option>
          </select>
        </div>

        <div class="field">
          <label for="durationRange">Durée par photo <span id="durationValue" class="field-value">3,0 s</span></label>
          <input id="durationRange" class="range" type="range" min="1" max="8" step="0.5" value="3" />
        </div>

        <div class="field">
          <label for="transitionDurationRange">Durée de transition <span id="transitionDurationValue" class="field-value">0,7 s</span></label>
          <input id="transitionDurationRange" class="range" type="range" min="0.2" max="1.5" step="0.1" value="0.7" />
        </div>

        <div class="field field-row">
          <label for="musicInput">Musique de fond</label>
          <div class="music-row">
            <button id="musicPickBtn" class="btn btn-ghost btn-sm" type="button">Choisir un morceau</button>
            <span id="musicName" class="music-name">Aucune</span>
            <button id="musicClearBtn" class="icon-btn icon-btn-sm hidden" type="button" aria-label="Retirer la musique">✕</button>
          </div>
          <input id="musicInput" type="file" accept="audio/*" hidden />
        </div>

        <div class="field field-row field-toggle">
          <label for="watermarkInput">Filigrane (optionnel)</label>
          <input id="watermarkInput" class="text-input" type="text" placeholder="ex. Été 2026" maxlength="40" />
        </div>

        <div class="field field-row field-toggle">
          <label for="qualitySelect">Qualité d'export</label>
          <select id="qualitySelect" class="select">
            <option value="standard">Standard</option>
            <option value="hd" selected>Haute définition</option>
          </select>
        </div>
      </div>

      <div class="panel preview-panel">
        <h2>Aperçu</h2>
        <div class="preview-stage">
          <canvas id="previewCanvas" width="720" height="1280" aria-label="Aperçu du montage"></canvas>
          <div id="previewEmpty" class="preview-empty">Ajoutez au moins 2 photos</div>
          <div class="preview-progress"><div id="previewProgressBar" class="preview-progress-bar"></div></div>
        </div>
        <div class="preview-controls">
          <button id="playBtn" class="btn btn-ghost btn-sm" type="button">▶ Lire l'aperçu</button>
          <span id="previewTime" class="preview-time">0:00</span>
        </div>
      </div>

      <button id="exportBtn" class="btn btn-primary btn-lg btn-export" type="button">
        <span class="btn-export-label">Générer le montage</span>
      </button>
    </aside>
  </section>

  <!-- Étape 3 : résultat / partage -->
  <section id="resultZone" class="result-zone hidden">
    <div class="panel result-panel">
      <div class="result-confetti" id="resultConfetti" aria-hidden="true"></div>
      <h2>Votre montage est prêt ✨</h2>
      <div class="result-card">
        <video id="resultVideo" class="result-video" controls playsinline></video>
        <div class="result-meta">
          <span id="resultDuration">—</span>
          <span class="dot">·</span>
          <span id="resultSize">—</span>
        </div>
      </div>
      <div class="result-actions">
        <button id="shareWhatsappBtn" class="btn btn-whatsapp btn-lg" type="button">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M12.04 2a9.94 9.94 0 0 0-8.5 15.1L2 22l5.06-1.5A9.94 9.94 0 1 0 12.04 2zm5.8 14.2c-.24.68-1.4 1.3-1.94 1.36-.5.06-1.13.09-1.83-.11a15.4 15.4 0 0 1-5.3-3.35 6.1 6.1 0 0 1-1.9-3.5c-.05-.7.35-1.35.75-1.77.18-.19.4-.27.6-.27h.44c.16 0 .34 0 .5.36.18.4.6 1.5.65 1.6.06.11.1.24.02.4-.08.16-.12.25-.24.38-.12.13-.26.29-.37.39-.12.11-.25.24-.11.48.15.24.65 1.07 1.4 1.74.97.86 1.79 1.13 2.04 1.26.24.12.39.1.53-.06.16-.18.65-.76.82-1.02.17-.26.34-.21.57-.13.24.08 1.51.71 1.77.84.26.13.44.2.5.31.07.12.07.66-.17 1.34z"/></svg>
          Partager sur WhatsApp
        </button>
        <button id="downloadBtn" class="btn btn-ghost btn-lg" type="button">Télécharger la vidéo</button>
        <button id="newMontageBtn" class="btn btn-ghost" type="button">Nouveau montage</button>
      </div>
    </div>
  </section>

  <!-- Historique -->
  <section id="historySection" class="history-section hidden">
    <h2>Montages précédents</h2>
    <ul id="historyList" class="history-list"></ul>
  </section>

</main>

<div id="exportOverlay" class="export-overlay hidden">
  <div class="export-overlay-inner">
    <div class="export-spinner" aria-hidden="true"></div>
    <p id="exportStatus">Préparation…</p>
    <div class="export-bar"><div id="exportBar" class="export-bar-fill"></div></div>
  </div>
</div>

<div id="toastRoot" class="toast-root" aria-live="polite"></div>

<script src="app.js"></script>
</body>
</html>
